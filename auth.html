<!doctype html>
<html lang="ru" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Auth | Smart Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="./styles.css" rel="stylesheet">

</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card card-soft p-4">
          <h3 class="mb-3" id="authTitle">Вход</h3>
          <form id="loginForm" class="d-grid gap-2">
            <input id="loginEmail" type="email" class="form-control" placeholder="Email" required>
            <input id="loginPassword" type="password" class="form-control" placeholder="Пароль" minlength="6" required>

            <button class="btn btn-primary">Войти</button>
          </form>

          <form id="registerForm" class="d-grid gap-2 d-none">
            <input id="regName" class="form-control" placeholder="Имя" required>
            <input id="regEmail" type="email" class="form-control" placeholder="Email" required>
            <input id="regPassword" type="password" class="form-control" placeholder="Пароль" minlength="6" required>
            <input id="regConfirm" type="password" class="form-control" placeholder="Повтор пароля" minlength="6" required>

            <button class="btn btn-primary">Зарегистрироваться</button>
          </form>


          <button type="button" id="switchMode" class="btn btn-link mt-2 px-0">Нет аккаунта? Регистрация</button>


          <button type="button" id="switchMode" class="btn btn-link mt-2 px-0">Нет аккаунта? Регистрация</button>

          <button id="switchMode" class="btn btn-link mt-2 px-0">Нет аккаунта? Регистрация</button>


        </div>
      </div>
    </div>
  </main>

  <script src="./auth.js"></script>

</body>
</html>
