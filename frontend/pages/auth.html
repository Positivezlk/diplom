<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Авторизация</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="card card-soft p-4">
          <h3 id="title" class="mb-3">Вход</h3>
          <form id="authForm" class="d-grid gap-2">
            <input id="name" class="form-control d-none" placeholder="Имя">
            <input id="email" type="email" class="form-control" placeholder="Email" required>
            <input id="password" type="password" class="form-control" placeholder="Пароль" minlength="6" required>
            <input id="confirm" type="password" class="form-control d-none" placeholder="Повтор пароля" minlength="6">
            <button id="submitBtn" class="btn btn-primary" type="submit">Войти</button>
          </form>
          <button id="toggleRegister" type="button" class="btn btn-link mt-2 px-0">Регистрация</button>
        </div>
      </div>
    </div>
  </main>
  <script src="/static/js/auth.js"></script>
</body>
</html>
