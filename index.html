<!doctype html>
<html lang="ru" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Умный Task Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
</head>
<body>
  <div class="d-flex min-vh-100" id="appShell">
    <aside class="sidebar p-3 border-end d-none d-md-flex flex-column">
      <h4 class="mb-4">Smart Tasks</h4>
      <nav class="nav flex-column gap-2">
        <a class="nav-link" href="#/dashboard">Dashboard</a>
        <a class="nav-link" href="#/tasks">Задачи</a>
        <a class="nav-link" href="#/profile">Профиль</a>
        <a class="nav-link" href="#/settings">Настройки</a>
      </nav>
    </aside>

    <main class="flex-grow-1 p-3 p-md-4">
      <header class="glass rounded-4 p-3 mb-3 d-flex justify-content-between align-items-center">
        <div>
          <button class="btn btn-outline-secondary d-md-none me-2" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">☰</button>
          <span class="fw-semibold">Умный task-менеджер</span>
        </div>
        <button id="themeBtn" class="btn btn-sm btn-dark">🌙</button>
      </header>
      <div id="view"></div>
    </main>
  </div>

  <nav class="bottom-nav d-md-none fixed-bottom bg-body border-top px-2 py-2 d-flex justify-content-around">
    <a href="#/dashboard" class="small text-decoration-none">Главная</a>
    <a href="#/tasks" class="small text-decoration-none">Задачи</a>
    <a href="#/profile" class="small text-decoration-none">Профиль</a>
    <a href="#/settings" class="small text-decoration-none">Настройки</a>
  </nav>

  <div class="offcanvas offcanvas-start" id="mobileMenu">
    <div class="offcanvas-header"><h5>Меню</h5><button class="btn-close" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body d-flex flex-column gap-2">
      <a class="btn btn-light" href="#/dashboard">Dashboard</a>
      <a class="btn btn-light" href="#/tasks">Задачи</a>
      <a class="btn btn-light" href="#/profile">Профиль</a>
      <a class="btn btn-light" href="#/settings">Настройки</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./app.js"></script>
</body>







<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Task Manager</title>
  </head>
  <body class="bg-slate-50 dark:bg-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
